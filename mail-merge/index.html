        /* Natural page scrolling like the original index.html */
        html,

        /* Full-screen mobile menu styles */
        #mobile-menu {
            transition: opacity 0.3s ease-in-out;
            padding-left: 2.5rem;
        }

        #mobile-menu ul {
            text-align: left;
            width: 100%;
        }

        /* Layout Container */
        .page-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* App Viewport - Fixed height or dynamic based on content */
        .app-container {
            flex-grow: 1;
            position: relative;
            background-color: #fff;
            margin-top: 72px;
            /* Fixed Header Height offset */
            min-height: calc(100vh - 72px);
            /* Ensures content fills the fold before footer */
            width: 100%;
        }

        iframe {
            width: 100%;
            height: calc(100vh - 72px);
            /* Makes the app itself occupy the full screen */
            border: none;
            display: block;
        }

        /* Custom Loader Overlay */
        #loading-overlay {
            position: absolute;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    <script>
        // App Load Handler
        function onAppLoaded() {
            const loader = document.getElementById('loading-overlay');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const menuButton = document.getElementById('menu-button');
            const mobileMenu = document.getElementById('mobile-menu');
            const menuOpenIcon = document.getElementById('menu-open-icon');
            const menuCloseIcon = document.getElementById('menu-close-icon');

            const toggleMenu = () => {
                const isMenuOpen = !mobileMenu.classList.contains('hidden');
                if (isMenuOpen) {
                    mobileMenu.classList.add('opacity-0');
                    document.body.style.overflow = '';
                    menuOpenIcon.classList.remove('hidden');
                    menuCloseIcon.classList.add('hidden');
                    setTimeout(() => mobileMenu.classList.add('hidden'), 300);
                } else {
                    mobileMenu.classList.remove('hidden');
                    menuOpenIcon.classList.add('hidden');
                    menuCloseIcon.classList.remove('hidden');
                    setTimeout(() => {
                        mobileMenu.classList.remove('opacity-0');
                        document.body.style.overflow = 'hidden';
                    }, 10);
                }
            };

            if (menuButton && mobileMenu) {
                menuButton.addEventListener('click', toggleMenu);
            }
            setTimeout(onAppLoaded, 5000);
        });
    </script>
